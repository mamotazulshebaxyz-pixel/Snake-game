<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Snake Game</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 🔥 Firebase Core and Services SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <!-- 🔒 ফায়ারবেস লগইন ওভারলে -->
    <div id="login-screen" class="auth-container">
        <h2>🐍 SKY SNAKE</h2>
        <p>লিডারবোর্ডে আপনার হাই স্কোর সেভ করতে এবং বন্ধুদের সাথে প্রতিযোগিতা করতে গুগল দিয়ে লগইন করুন।</p>
        <button id="google-login-btn">
            <svg style="width:20px; height:20px;" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.137 4.114-3.466 0-6.277-2.81-6.277-6.277 0-3.466 2.81-6.277 6.277-6.277 1.488 0 2.843.523 3.911 1.39l3.076-3.076C18.995 2.05 15.82 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.158 0 11.107-4.953 11.107-11.107 0-.7-.06-1.383-.18-2.038H12.24z"/>
            </svg>
            Google দিয়ে লগইন করুন
        </button>
    </div>

    <!-- 🎮 মেইন গেম কন্টেইনার -->
    <div class="game">
        <div class="game-header">
            <h1>Sky Snake</h1>
            <div id="lives-container">❤️ ❤️ ❤️</div>
        </div>

        <div class="score-board">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="pauseBtn" style="display: none;">⏸ Pause</button>
        </div>
        
        <div class="info">পিসিতে খেলতে Arrow Keys এবং মোবাইলের জন্য Swipe করুন।</div>
    </div>

    <!-- 🎮 মেইন স্টার্ট/গেমওভার মেনু -->
    <div id="menu" class="hidden">
        <h2>🐍 SKY SNAKE</h2>
        <button id="playBtn">▶ Play</button>
        <button id="restart" style="display: none;">🔄 Restart</button>
        <button id="cancelBtn" style="display: none;">❌ Cancel</button>
        <button id="leaderboardBtn">🏆 Leaderboard</button>
    </div>

    <!-- 🏆 লিডারবোর্ড পপ-আপ মডাল -->
    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Top 10 Leaders</h2>
            <div id="leaderboard-list">
                <!-- ডায়নামিক স্কোর এখানে লোড হবে -->
            </div>
            <button id="closeLeaderboard">🔙 Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
