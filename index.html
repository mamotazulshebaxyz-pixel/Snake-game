<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🏠 আলাদা হোমপেজের জন্য কাস্টম সিএসএস (আপনার দেওয়া স্ক্রিনশটের হুবহু ডিজাইন) */
        #custom-homepage {
            width: 400px;
            height: 480px; 
            background-color: #1a252f; /* স্ক্রিনশটের ডার্ক ব্লু-ইশ ব্যাকগ্রাউন্ড */
            border: 3px solid #2ecc71; /* সি-গ্রিন বর্ডার */
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: sans-serif;
            margin: 20px auto;
            box-sizing: border-box;
        }

        /* মাঝের ডার্ক বক্সটি */
        .home-box {
            background-color: #0f172a; /* গাঢ় কালো বক্স */
            padding: 35px 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
            box-sizing: border-box;
        }

        /* টাইটেল */
        .home-title {
            color: #2ecc71;
            font-size: 26px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* বাটন স্টাইল */
        .home-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .home-btn:last-child {
            margin-bottom: 0;
        }

        /* সবুজ বাটন (Play & Leaderboard) */
        .btn-green {
            background-color: #27ae60;
        }
        .btn-green:hover {
            background-color: #2ecc71;
        }

        /* নিচের ইনস্ট্রাকশন টেক্সট */
        .home-footer {
            position: absolute;
            bottom: 20px;
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            width: 100%;
        }

        /* অন/অফ করার জন্য হেল্পার ক্লাস */
        .hidden-layout {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 💡 ফায়ারবেস লগইন ওভারলে -->
    <div id="login-screen" class="auth-container">
        <h2>🐍 SKY SNAKE</h2>
        <p>যেকোনো ডিভাইস থেকে হাই স্কোর সেভ রাখতে লগইন করুন</p>
        <button id="google-login-btn">
            <svg style="width:20px; height:20px;" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.9h6.69c-.29 1.5-.14 3.01-.1 4.5l3.12 2.42c1.84-1.7 2.91-4.2 2.91-7.25z"/>
                <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.12-2.42c-.9.6-2.01.94-3.24.94-2.5 0-4.61-1.69-5.36-3.97L5.05 18.1c1.55 3.1 4.78 5.14 8.51 5.14z"/>
                <path fill="#FBBC05" d="M6.64 15.64c-.2-.6-.31-1.24-.31-1.89s.11-1.29.31-1.89L3.45 9.42C2.52 11.23 2 13.29 2 15.5s.52 4.27 1.45 6.08l3.19-2.44z"/>
                <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 8.27 0 5.04 2.04 3.45 5.14l3.19 2.44c.75-2.28 2.86-3.97 5.36-3.97z"/>
            </svg>
            Sign in with Google
        </button>
    </div>

    <!-- 🏠 আলাদা নতুন হোমপেজ স্ক্রিন (শুরুতে শুধু এটি দেখাবে) -->
    <div id="custom-homepage">
        <div class="home-box">
            <!-- জাভাস্ক্রিপ্ট দিয়ে টাইটেল ও বাটন টেক্সট গেম ওভারের সময় পরিবর্তন করা যাবে -->
            <h2 id="home-title-text" class="home-title">🐍 SKY SNAKE</h2>
            <button id="playBtn" class="home-btn btn-green">▶ Play</button>
            <button id="leaderboardBtn" class="home-btn btn-green">🏆 Global Leaderboard</button>
            <button id="restart" class="home-btn btn-green" style="display: none;">🔄 Restart</button>
            <button id="cancelBtn" class="home-btn" style="display: none; background: #7f8c8d;">❌ Quit</button>
        </div>
        <div class="home-footer">🎮 Desktop: Use Arrows | Mobile: Drag on Screen</div>
    </div>

    <!-- 🎮 মূল গেম কন্টেইনার (শুরুতে hidden-layout ক্লাস দিয়ে লুকানো থাকবে) -->
    <div id="main-game-layout" class="game hidden-layout">
        <!-- হেডার সেকশন -->
        <div class="game-header">
            <h1>🐍 SKY SNAKE</h1>
            <div id="lives-container">❤️ ❤️ ❤️</div>
        </div>
        
        <div class="score-board">
            <div>🍎 Score: <span id="score">0</span></div>
            <div>🏆 High: <span id="highScore">0</span></div>
            <div>⭐ Level: <span id="level">1</span></div>
        </div>

        <!-- গেম ক্যানভাস -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- পজ এবং মিউট বাটন সেকশন -->
        <div class="controls">
            <button id="pauseBtn">⏸ Pause</button>
            <button id="muteBtn" style="background: #3498db; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px;">🔊 Sound: On</button>
        </div>

        <div class="info">🎮 Desktop: Use Arrows | Mobile: Drag on Screen</div>
    </div>

    <!-- 🏆 গ্লোবাল লিডারবোর্ড মডাল পপ-আপ -->
    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Global Leaderboard</h2>
            <div id="leaderboard-list">
                <p>লোডিং...</p>
            </div>
            <button id="closeLeaderboard" style="width: 100%; margin-top: 20px; background: #ef4444;">🔙 Back</button>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
